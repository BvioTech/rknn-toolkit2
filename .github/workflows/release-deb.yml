name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      # debian:bookworm has no git/ca-certs; needed before actions/checkout.
      - name: Prereqs for checkout
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v4

      - name: Build arm64 deb (bookworm native cross)
        run: ./scripts/package.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: |
            *.deb
            *.sha256

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.sha256

      # No apt webhook: this is a public repo and GitHub does not expose the
      # org APT_WEBHOOK_SECRET to it. These vendored deps change rarely, so we
      # rely on violoop-apt's hourly full sync to pick up new releases.
