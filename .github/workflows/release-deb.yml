name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Build deb package
        run: ./rknpu2/runtime/Linux/package.sh ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: 'rknpu2/runtime/Linux/*.deb'

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.deb'

      - name: Notify apt repo
        env:
          SECRET: ${{ secrets.APT_WEBHOOK_SECRET }}
          HOOK_URL: https://deb.violoop.ai/hook/release
        run: |
          BODY=$(jq -cn --arg r "${{ github.repository }}" --arg t "${{ github.ref_name }}" \
            '{repo:$r, tag:$t}')
          SIG=sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" -hex | awk '{print $2}')
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            --data "$BODY"
